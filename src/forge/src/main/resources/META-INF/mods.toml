modLoader = "javafml"
loaderVersion = "${loader}"
issueTrackerURL = "https://github.com/FuzjaJadrowa/LocatorBar/issues"
license = "GPL-3.0"

[[mods]]
modId = "locatorbar"
version = "${version}"
displayName = "Locator Bar"
authors = "FuzjaJadrowa"
displayURL = "https://fuzjajadrowa.pl"
logoFile = "assets/locatorbar/textures/icon.png"
description = '''
Reworked concept of a player locator bar for Minecraft. Simple, clean bar at the top of your screen.
'''

[[dependencies.locatorbar]]
modId = "forge"
mandatory = true
versionRange = "${forge}"
ordering = "NONE"
side = "BOTH"

[[dependencies.locatorbar]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft}"
ordering = "NONE"
side = "BOTH"