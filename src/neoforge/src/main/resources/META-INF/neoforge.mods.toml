modLoader = "javafml"
loaderVersion = "${neoforge_loader_range}"
issueTrackerURL = "https://github.com/FuzjaJadrowa/LocatorBar/issues"
license = "GPL-3.0"

[[mods]]
modId = "locatorbar"
version = "${version}"
displayName = "Locator Bar"
authors = "FuzjaJadrowa"
displayURL = "https://fuzjajadrowa.pl"
logoFile = "assets/locatorbar/textures/icon.png"
description = '''
Reworked concept of a player locator bar for Minecraft. Simple, clean bar at the top of your screen.
'''

[[dependencies.locatorbar]]
modId = "neoforge"
type = "required"
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.locatorbar]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_targets}"
ordering = "NONE"
side = "BOTH"

[[mixins]]
config = "locatorbar.common.mixins.json"
