name: Build All Targets

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.target }} (${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "1.21.1-fabric"
            mc: "1.21.1"
            loader: "fabric"
            java: "21"
          - target: "1.21.1-neoforge"
            mc: "1.21.1"
            loader: "neoforge"
            java: "21"
          - target: "1.21.4-fabric"
            mc: "1.21.4"
            loader: "fabric"
            java: "21"
          - target: "1.21.4-neoforge"
            mc: "1.21.4"
            loader: "neoforge"
            java: "21"
          - target: "1.21.11-fabric"
            mc: "1.21.11"
            loader: "fabric"
            java: "21"
          - target: "1.21.11-neoforge"
            mc: "1.21.11"
            loader: "neoforge"
            java: "21"
          - target: "26.1-fabric"
            mc: "26.1"
            loader: "fabric"
            java: "25"
          - target: "26.1-neoforge"
            mc: "26.1"
            loader: "neoforge"
            java: "25"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build target
        run: ./gradlew clean :${{ matrix.loader }}:jar -Ptarget.mc=${{ matrix.mc }} --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: locatorbar-${{ matrix.target }}
          path: ${{ matrix.loader }}/build/libs/*.jar
          if-no-files-found: error
